<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <title>vfan-docs</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="vfan-docs" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/themes/vue.min.css" />
    <!-- default-theme -->
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/themes/buble.css"> -->
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/themes/dark.css"> -->
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/themes/pure.css"> -->
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify/themes/dolphin.css"> -->

    <!-- docsify-themeable -->
    <!-- <link rel="stylesheet" media="(prefers-color-scheme: light)" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css"> -->
    <!-- <link rel="stylesheet" media="(prefers-color-scheme: dark)" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple-dark.css"> -->

    <!-- docsify-darklight-theme -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/style.min.css" title="docsify-darklight-theme" type="text/css" />

    <!-- docsify-sidebar-collapse -->
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar.min.css" /> -->
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/sidebar-folder.min.css" /> -->

    <!-- docsify-toc -->
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-toc@1.0.0/dist/toc.css" /> -->
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.$docsify = {
        el: '#app',
        // repo: 'https://github.com/VfanLee/vfan-docs',
        name: 'vfan-docs',
        nameLink: location.pathname,
        alias: {
          // '/.*/_sidebar.md': '/_sidebar.md',
          '/.*/_navbar.md': '/_navbar.md',
        },

        // ------------ coverpage ------------
        coverpage: true,
        onlyCover: true,

        // ------------ navbar ------------
        loadNavbar: true,

        // ------------ sidebar ------------
        loadSidebar: true,
        subMaxLevel: 0,

        // ------------ plugins ------------
        // https://github.com/mrpotatoes/docsify-toc
        // toc: {
        //   scope: '.markdown-section',
        //   headings: 'h2, h3, h4, h5, h6',
        //   title: '目录',
        // },
        // https://github.com/jperasmus/docsify-copy-code
        copyCode: {
          buttonText: '复制',
          errorText: '复制失败',
          successText: '复制成功',
        },
        // https://jhildenbiddle.github.io/docsify-tabs/
        tabs: {
          persist: false,
          sync: false,
          theme: 'classic',
          tabComments: true,
          tabHeadings: true,
        },
      }
    </script>
    <!-- docsify4 -->
    <script src="https://cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>

    <!-- docsify-themeable -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/js/docsify-themeable.min.js"></script> -->

    <!-- docsify-darklight-theme -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-darklight-theme@latest/dist/index.min.js" type="text/javascript"></script>

    <!-- search -->
    <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

    <!-- zoom-image -->
    <script src="https://cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>

    <!-- 分页导航 -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

    <!-- 侧边栏目录折叠 -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>

    <!-- TOC -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/docsify-toc/dist/toc.js"></script> -->

    <!-- 代码复制 -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code"></script>

    <!-- tabs -->
    <script src="https://cdn.jsdelivr.net/npm/docsify-tabs"></script>
  </body>
</html>
